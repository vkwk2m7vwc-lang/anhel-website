<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <!--
    Placeholder render for Control Systems cabinet.
    Real photographs (ANHEL® шкафы управления) will be added by Alexey
    once available. Until then this isometric line-art reads as
    "control cabinet" without committing to a specific brand or
    model. Stroke uses currentColor so the cabinet inherits the page
    text colour and works on both light and dark themes.
  -->
  <g stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85">
    <!-- Cabinet body — front face -->
    <rect x="80" y="80" width="240" height="440" rx="6" fill="none" />
    <!-- Door split -->
    <line x1="200" y1="80" x2="200" y2="520" />
    <!-- Top panel (mounted plate) -->
    <line x1="80" y1="120" x2="320" y2="120" />
    <!-- Bottom service plate -->
    <line x1="80" y1="480" x2="320" y2="480" />
    <!-- Door handle -->
    <rect x="183" y="280" width="8" height="40" rx="2" fill="currentColor" opacity="0.6" />
    <rect x="209" y="280" width="8" height="40" rx="2" fill="currentColor" opacity="0.6" />
    <!-- Indicator lights row -->
    <circle cx="110" cy="100" r="5" fill="currentColor" opacity="0.45" />
    <circle cx="130" cy="100" r="5" fill="currentColor" opacity="0.3" />
    <circle cx="150" cy="100" r="5" fill="currentColor" opacity="0.3" />
    <circle cx="170" cy="100" r="5" fill="currentColor" opacity="0.3" />
    <!-- HMI screen -->
    <rect x="240" y="90" width="60" height="22" rx="2" fill="currentColor" opacity="0.15" />
    <!-- Ventilation grille -->
    <line x1="105" y1="500" x2="170" y2="500" opacity="0.5" />
    <line x1="105" y1="508" x2="170" y2="508" opacity="0.5" />
    <line x1="230" y1="500" x2="295" y2="500" opacity="0.5" />
    <line x1="230" y1="508" x2="295" y2="508" opacity="0.5" />
    <!-- Bottom feet -->
    <line x1="100" y1="520" x2="100" y2="540" />
    <line x1="300" y1="520" x2="300" y2="540" />
    <!-- Mounting label panel -->
    <rect x="120" y="160" width="160" height="80" rx="3" fill="none" stroke-dasharray="4 4" opacity="0.4" />
    <text x="200" y="207" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="currentColor" opacity="0.55" letter-spacing="2">ANHEL</text>
  </g>
</svg>
